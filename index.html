<style>
:root {
  --bg: #fdfbf7;
  --bg2: #ffffff;
  --bg3: #f5f2eb;
  --surface: #ffffff;
  --border: #2d3748;
  --border2: #4a5568;
  --accent: #ff6b6b;
  --accent2: #4ecdc4;
  --text: #2d3748;
  --muted: #718096;
  --muted2: #4a5568;
  --green: #48bb78;
  --radius-doodle: 255px 15px 225px 15px/15px 225px 15px 255px;
  --radius-doodle-alt: 15px 255px 15px 225px/225px 15px 255px 15px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Comic Neue', cursive; overflow: hidden; font-weight: 700; }

/* ── HERO ── */
#heroScreen {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 24px; overflow: hidden; pointer-events: none;
}
.hero-logo { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; transform: scale(2.5); position: relative; z-index: 5; pointer-events: auto; }
.logo-mark {
  width: 48px; height: 48px; border-radius: var(--radius-doodle);
  background: var(--accent); border: 3px solid var(--text);
  display: flex; align-items: center; justify-content: center; position: relative;
  box-shadow: 4px 4px 0px var(--text);
}
.logo-mark::before {
  content: ''; position: absolute; width: 22px; height: 22px;
  border: 4px solid white; border-radius: 50%; top: 10px; left: 10px;
}
.logo-mark::after {
  content: ''; position: absolute; width: 12px; height: 4px;
  background: white; border-radius: 2px; bottom: 12px; right: 8px;
  transform: rotate(45deg); transform-origin: right center;
}
.logo-name { font-size: 42px; font-weight: 700; letter-spacing: 1px; color: var(--text); }

.hero-cta-wrap { position: relative; z-index: 5; pointer-events: auto; margin-top: 20px; }
.cta-btn {
  padding: 20px 60px;
  background: var(--accent2); border: 4px solid var(--text);
  color: white; border-radius: var(--radius-doodle-alt); font-size: 26px; font-weight: 700;
  font-family: 'Comic Neue', cursive; cursor: pointer; letter-spacing: 2px;
  box-shadow: 8px 8px 0px var(--text); transition: all 0.2s; text-transform: uppercase;
}
.cta-btn:hover { transform: translate(-3px, -3px) rotate(-2deg); box-shadow: 11px 11px 0px var(--text); background: #3ab7af; }
.cta-btn:active { transform: translate(4px, 4px) rotate(1deg); box-shadow: 4px 4px 0px var(--text); }

.hero-cats {
  position: absolute; inset: 0; pointer-events: none; z-index: 1; overflow: hidden;
}
.cat-pill {
  position: absolute; pointer-events: auto; top: 0; left: 0;
  background: var(--bg2); border: 3px solid var(--text);
  border-radius: 50%; color: var(--text);
  font-family: 'Comic Neue', cursive; font-weight: 700; line-height: 1.1;
  box-shadow: 4px 4px 0px var(--text);
  display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer;
  user-select: none;
}
.cat-pill:hover { background: var(--accent); color: white; }

/* ── CHAT SCREEN ── */
#chatScreen {
  position: fixed; inset: 0; z-index: 15;
  display: flex; flex-direction: column;
  max-width: 700px; margin: 0 auto; background: var(--bg);
  opacity: 0; transform: translateY(30px); pointer-events: none;
  transition: opacity 0.5s ease, transform 0.5s ease;
  border-left: 4px solid var(--text); border-right: 4px solid var(--text);
  box-shadow: 10px 0 0 rgba(0,0,0,0.05), -10px 0 0 rgba(0,0,0,0.05);
}
#chatScreen.active { opacity: 1; transform: translateY(0); pointer-events: all; }

.chat-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 15px 22px; border-bottom: 4px solid var(--text);
  background: var(--bg2); flex-shrink: 0;
}
.chat-logo { display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 700; cursor: pointer; }
.chat-logo .dot { width: 12px; height: 12px; background: var(--accent); border-radius: var(--radius-doodle); border: 2px solid var(--text); }
.back-btn {
  padding: 8px 18px; background: var(--bg3); border: 3px solid var(--text);
  border-radius: var(--radius-doodle); color: var(--text); font-size: 16px; font-family: 'Comic Neue', cursive; font-weight: 700;
  cursor: pointer; transition: all 0.2s; box-shadow: 3px 3px 0px var(--text);
}
.back-btn:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0px var(--text); background: var(--accent2); color: white; }
.back-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px var(--text); }

.feed {
  flex: 1; overflow-y: auto; padding: 25px 20px; display: flex; flex-direction: column; gap: 18px;
  background: url('data:image/svg+xml,<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="1.5" fill="%232d3748" opacity="0.15"/></svg>');
}

.intro-card {
  background: var(--bg2); border: 4px solid var(--text); border-radius: var(--radius-doodle);
  padding: 22px; box-shadow: 6px 6px 0px var(--text);
  animation: msgIn 0.4s ease both; text-align: center;
}
.ic-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 10px; line-height: 1.2; }
.ic-body { font-size: 16px; color: var(--muted2); line-height: 1.5; }

.chip-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 10px; }
.chip {
  padding: 10px 18px; background: var(--bg3); border: 3px solid var(--text);
  border-radius: var(--radius-doodle-alt); font-size: 15px; color: var(--text); cursor: pointer;
  transition: all 0.2s; box-shadow: 3px 3px 0px var(--text); font-weight: 700;
}
.chip:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0px var(--text); background: var(--accent); color: white; }

.msg-row { display: flex; gap: 12px; animation: msgIn 0.35s ease both; }
@keyframes msgIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.msg-row.user { justify-content: flex-end; }
.av { width: 40px; height: 40px; border-radius: var(--radius-doodle); border: 3px solid var(--text); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; box-shadow: 2px 2px 0px var(--text); }
.av-bot { background: var(--accent); color: white; }
.av-user { background: var(--accent2); color: white; }
.bubble { max-width: 80%; padding: 16px 20px; border-radius: var(--radius-doodle); border: 3px solid var(--text); font-size: 16px; line-height: 1.5; box-shadow: 4px 4px 0px var(--text); }
.bubble-bot { background: var(--bg2); color: var(--text); border-top-left-radius: 4px; }
.bubble-user { background: var(--accent2); color: white; border-top-right-radius: 4px; }

.prod-card { margin-top: 15px; border: 4px solid var(--text); border-radius: var(--radius-doodle-alt); overflow: hidden; background: var(--bg2); box-shadow: 6px 6px 0px var(--text); }
.prod-top { padding: 15px 20px; border-bottom: 4px solid var(--text); background: var(--bg3); display: flex; justify-content: space-between; align-items: flex-start; }
.prod-eyebrow { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; font-weight: 700; }
.prod-name { font-size: 20px; font-weight: 700; line-height: 1.2; color: var(--text); }
.prod-cat { font-size: 14px; color: var(--muted); margin-top: 4px; }
.prod-body { padding: 18px 20px; }
.prod-why { font-size: 16px; color: var(--muted2); line-height: 1.5; margin-bottom: 18px; padding-left: 14px; border-left: 4px solid var(--accent2); }
.btn-buy {
  display: block; width: 100%; text-align: center; padding: 14px; background: var(--accent);
  border: 3px solid var(--text); color: white; border-radius: var(--radius-doodle); font-size: 18px; font-weight: 700;
  text-decoration: none; transition: all 0.2s; box-shadow: 4px 4px 0px var(--text);
}
.btn-buy:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--text); background: #ff5252; }
.btn-alt-buy {
  flex: 1; padding: 12px; background: var(--bg3); border: 2px solid var(--text);
  color: var(--text); border-radius: var(--radius-doodle); font-size: 14px; font-weight: 700;
  text-decoration: none; transition: all 0.2s; text-align: center; box-shadow: 2px 2px 0px var(--text);
}
.btn-alt-buy:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0px var(--text); background: var(--bg2); }

.badge-verified {
  position: absolute; top: 12px; left: 12px; background: var(--green); color: white;
  padding: 4px 10px; border-radius: var(--radius-doodle); border: 2px solid var(--text);
  font-size: 11px; font-weight: 700; transform: rotate(-5deg); box-shadow: 2px 2px 0px var(--text);
}

.footer-disclosure {
  padding: 15px 20px; text-align: center; font-size: 11px; color: var(--muted);
  line-height: 1.4; border-top: 2px solid rgba(0,0,0,0.05);
}

.typing-row { display: flex; gap: 12px; animation: msgIn 0.3s ease both; }
.typing-dots { display: flex; gap: 6px; padding: 8px 4px; }
.typing-dots span { width: 8px; height: 8px; background: var(--text); border-radius: 50%; animation: blink 1s infinite alternate; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { from{transform:translateY(0)} to{transform:translateY(-6px)} }

/* ── 3-TIER CARDS ── */
.tier-grid { display: flex; flex-direction: column; gap: 16px; margin-top: 15px; }
.tier-card {
  border: 4px solid var(--text); border-radius: var(--radius-doodle-alt); overflow: hidden;
  background: var(--bg2); box-shadow: 6px 6px 0px var(--text); animation: msgIn 0.4s ease both;
}
.tier-card:nth-child(2) { animation-delay: 0.1s; }
.tier-card:nth-child(3) { animation-delay: 0.2s; }
.tier-header {
  padding: 14px 18px; border-bottom: 4px solid var(--text); display: flex;
  justify-content: space-between; align-items: center;
}
.tier-label {
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700;
  padding: 4px 12px; border-radius: var(--radius-doodle); border: 2px solid var(--text);
}
.tier-label.budget { background: var(--accent2); color: #fff; }
.tier-label.mid { background: var(--accent); color: #fff; }
.tier-label.premium { background: #805ad5; color: #fff; }
.tier-price {
  font-size: 18px; font-weight: 700; color: var(--text);
}
.tier-body { padding: 16px 18px; }
.tier-name { font-size: 19px; font-weight: 700; line-height: 1.2; color: var(--text); }
.tier-tagline { font-size: 14px; color: var(--muted2); margin-top: 4px; font-style: italic; }
.tier-specs { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0; }
.tier-spec {
  font-size: 11px; padding: 4px 10px; background: var(--bg3); border: 2px solid var(--text);
  border-radius: var(--radius-doodle); font-weight: 700; color: var(--muted2);
}
.tier-why { font-size: 14px; color: var(--muted2); line-height: 1.5; margin-bottom: 14px; padding-left: 12px; border-left: 4px solid var(--accent2); }
.tier-buttons { display: flex; flex-direction: column; gap: 8px; }
.tier-btn-primary {
  display: block; width: 100%; text-align: center; padding: 12px; background: var(--accent);
  border: 3px solid var(--text); color: white; border-radius: var(--radius-doodle); font-size: 16px; font-weight: 700;
  text-decoration: none; transition: all 0.2s; box-shadow: 4px 4px 0px var(--text); font-family: 'Comic Neue', cursive;
}
.tier-btn-primary:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--text); background: #ff5252; }
.tier-alt-row { display: flex; gap: 6px; }
.tier-btn-alt {
  flex: 1; padding: 9px; background: var(--bg3); border: 2px solid var(--text);
  color: var(--text); border-radius: var(--radius-doodle); font-size: 12px; font-weight: 700;
  text-decoration: none; transition: all 0.2s; text-align: center; box-shadow: 2px 2px 0px var(--text); font-family: 'Comic Neue', cursive;
}
.tier-btn-alt:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0px var(--text); background: var(--bg2); }

.input-zone { padding: 20px; flex-shrink: 0; background: var(--bg2); border-top: 4px solid var(--text); }
.input-box { display: flex; align-items: flex-end; gap: 12px; }
#chatTxt { flex: 1; background: var(--bg3); border: 3px solid var(--text); border-radius: var(--radius-doodle); padding: 14px 18px; color: var(--text); font-family: 'Comic Neue', cursive; font-size: 16px; font-weight: 700; resize: none; max-height: 120px; line-height: 1.5; box-shadow: inset 2px 2px 0px rgba(0,0,0,0.05); }
#chatTxt:focus { outline: none; border-color: var(--accent); background: #fff; }
#sendBtn { width: 50px; height: 50px; border-radius: var(--radius-doodle-alt); background: var(--accent2); border: 3px solid var(--text); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; box-shadow: 4px 4px 0px var(--text); transition: all 0.2s; }
#sendBtn:hover:not(:disabled) { transform: translate(-2px, -2px) rotate(5deg); box-shadow: 6px 6px 0px var(--text); }
#sendBtn:disabled { background: var(--muted); cursor: not-allowed; box-shadow: none; transform: none; }
#sendBtn svg { width: 22px; height: 22px; }
</style>
</head>
<body>

<!-- HERO -->
<div id="heroScreen">
  <div class="hero-logo">
    <div class="logo-mark"></div>
    <div class="logo-name">Scout</div>
  </div>
  <div class="hero-cta-wrap">
    <button class="cta-btn" id="startBtn">I'm Feeling Lucky</button>
  </div>
  <div class="hero-cats" id="heroCats"></div>
</div>

<!-- CHAT -->
<div id="chatScreen">
  <div class="chat-nav">
    <div class="chat-logo" onclick="goBack()">
      <span class="dot"></span>Scout
    </div>
    <div style="display:flex;gap:12px;">
      <button class="back-btn" onclick="clearChat()">↺ Reset</button>
      <button class="back-btn" onclick="goBack()">← Back</button>
    </div>
  </div>
  <div class="feed" id="feed">
    <div class="intro-card" id="introCard">
      <!-- Injected by JS -->
    </div>
    <div class="chip-row" id="chipRow">
      <!-- Injected by JS -->
    </div>
  </div>
  <div class="input-zone">
    <div class="input-box">
      <textarea id="chatTxt" rows="1" placeholder="Type anything..."
        oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button id="sendBtn" onclick="sendMsg()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="footer-disclosure">
    Scoutr is an independent recommendation engine. We may earn a small commission when you purchase through our links at no extra cost to you. This helps us keep the bubbles floating!
  </div>
</div>

<script>
// Data
const catData = {
  "Tech": ["Best laptop for coding", "Noise cancelling headphones", "Mechanical keyboards"],
  "Fitness": ["Home gym equipment", "Yoga mats", "Protein powder", "Dumbbells"],
  "Travel": ["Carry-on luggage", "Travel adapters", "Neck pillows"],
  "Pets": ["Indestructible dog toys", "Automatic cat feeders", "Pet cameras"],
  "Auto": ["Car vacuum cleaners", "Dash cams", "Phone mounts"],
  "Outdoors": ["Camping tents", "Hiking boots", "Portable grills"],
  "Work": ["Ergonomic office chairs", "Standing desks", "Webcams"],
  "Cooking": ["Air fryers", "Chef knife sets", "Coffee makers"],
  "Gaming": ["Gaming mice", "Controllers", "Monitors"],
  "Photo": ["Vlogging cameras", "Ring lights", "Tripods"],
  "Health": ["Massage guns", "Air purifiers", "Water bottles"],
  "Fashion": ["Everyday sneakers", "Winter coats", "Sunglasses"],
  "Garden": ["Indoor plant pots", "Gardening tools", "Watering cans"],
  "Music": ["Beginner guitars", "MIDI keyboards", "Record players"],
  "Books": ["Kindle cases", "Reading lights", "Bookmarks"],
  "Art": ["Sketchbooks", "Watercolor sets", "Drawing tablets"],
  "DIY": ["Power drill kits", "Toolboxes", "Paint sprayers"],
  "Kids": ["Educational toys", "Building blocks", "Kids tablets"],
  "Sports": ["Basketballs", "Tennis rackets", "Golf clubs"],
  "Beauty": ["Skincare fridges", "Makeup brushes", "Hair dryers"]
};
const categories = Object.keys(catData);

// Physics Bubbles
const bubbles = [];
const heroCats = document.getElementById('heroCats');

categories.forEach(cat => {
  for(let i=0; i<2; i++) { // Generate 40 bubbles total
    const el = document.createElement('div');
    el.className = 'cat-pill';
    el.textContent = cat;
    el.onclick = () => launchWithCat(cat);
    
    const radius = 45 + Math.random() * 35; // r: 45-80, dia: 90-160
    el.style.width = (radius*2) + 'px';
    el.style.height = (radius*2) + 'px';
    el.style.fontSize = (radius * 0.35) + 'px';
    
    heroCats.appendChild(el);
    bubbles.push({
      el, r: radius,
      x: radius + Math.random() * (window.innerWidth - radius*2),
      y: radius + Math.random() * (window.innerHeight - radius*2),
      vx: (Math.random() - 0.5) * 3,
      vy: (Math.random() - 0.5) * 3
    });
  }
});

let mouseX = -1000, mouseY = -1000;
document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

function physicsLoop() {
  const W = window.innerWidth, H = window.innerHeight;
  
  bubbles.forEach(b => {
    b.x += b.vx;
    b.y += b.vy;
    
    // Bounds
    if(b.x - b.r < 0) { b.x = b.r; b.vx *= -1; }
    if(b.x + b.r > W) { b.x = W - b.r; b.vx *= -1; }
    if(b.y - b.r < 0) { b.y = b.r; b.vy *= -1; }
    if(b.y + b.r > H) { b.y = H - b.r; b.vy *= -1; }
    
    // Mouse repel
    const dxm = b.x - mouseX;
    const dym = b.y - mouseY;
    const distm = Math.sqrt(dxm*dxm + dym*dym);
    if(distm < 200) {
      b.vx += (dxm / distm) * 0.8;
      b.vy += (dym / distm) * 0.8;
    }
    
    // Friction / Speed limit
    const speed = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
    if(speed > 4) {
      b.vx = (b.vx/speed) * 4;
      b.vy = (b.vy/speed) * 4;
    } else if (speed < 0.5) {
      // minimum speed to keep them floating
      b.vx = b.vx === 0 ? 0.5 : (b.vx/speed) * 0.5;
      b.vy = b.vy === 0 ? 0.5 : (b.vy/speed) * 0.5;
    }
  });
  
  // Collisions
  for(let i=0; i<bubbles.length; i++) {
    for(let j=i+1; j<bubbles.length; j++) {
      const b1 = bubbles[i];
      const b2 = bubbles[j];
      const dx = b2.x - b1.x;
      const dy = b2.y - b1.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const minDist = b1.r + b2.r;
      
      if(dist < minDist && dist > 0) {
        const overlap = minDist - dist;
        const nx = dx / dist;
        const ny = dy / dist;
        // Resolve overlap
        b1.x -= nx * overlap * 0.5;
        b1.y -= ny * overlap * 0.5;
        b2.x += nx * overlap * 0.5;
        b2.y += ny * overlap * 0.5;
        
        // Elastic bounce
        const dvx = b2.vx - b1.vx;
        const dvy = b2.vy - b1.vy;
        const dot = dvx * nx + dvy * ny;
        if(dot < 0) { // moving towards each other
          b1.vx += nx * dot;
          b1.vy += ny * dot;
          b2.vx -= nx * dot;
          b2.vy -= ny * dot;
        }
      }
    }
  }
  
  bubbles.forEach(b => {
    b.el.style.transform = `translate(${b.x - b.r}px, ${b.y - b.r}px)`;
  });
  
  requestAnimationFrame(physicsLoop);
}
physicsLoop();

// Transitions
function launch() {
  document.getElementById('heroScreen').style.opacity = '0';
  document.getElementById('heroScreen').style.pointerEvents = 'none';
  setTimeout(()=>{
    document.getElementById('chatScreen').classList.add('active');
    document.getElementById('chatTxt').focus();
    renderSuggestions("General");
  }, 400);
}

function launchWithCat(cat) {
  document.getElementById('heroScreen').style.opacity = '0';
  document.getElementById('heroScreen').style.pointerEvents = 'none';
  setTimeout(()=>{
    document.getElementById('chatScreen').classList.add('active');
    document.getElementById('chatTxt').focus();
    renderSuggestions(cat);
  }, 400);
}

document.getElementById('startBtn').onclick = launch;

function goBack(){
  document.getElementById('chatScreen').classList.remove('active');
  const h = document.getElementById('heroScreen');
  h.style.opacity = '1';
  h.style.pointerEvents = 'auto';
}

// Chat UI
function renderSuggestions(cat) {
  const intro = document.getElementById('introCard');
  const row = document.getElementById('chipRow');
  
  intro.innerHTML = `
    <div class="ic-title">Let's explore ${cat}!</div>
    <div class="ic-body">I can find the perfect product for any problem. What do you need?</div>
  `;
  
  const suggestions = catData[cat] || ["Surprise me with a cool gadget", "I need a unique gift idea", "What's the best tech accessory?"];
  
  let html = '';
  suggestions.forEach(s => {
    html += `<div class="chip" onclick="useChip(this)">${s}</div>`;
  });
  row.innerHTML = html;
}

const API='/api/chat';
let busy=false;
let historyLog=[];
const feed=document.getElementById('feed');
const txt=document.getElementById('chatTxt');
const sBtn=document.getElementById('sendBtn');

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';sBtn.disabled=el.value.trim().length===0;}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function useChip(el){txt.value=el.textContent.trim();autoResize(txt);txt.focus();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function scrl(){setTimeout(()=>feed.lastElementChild?.scrollIntoView({behavior:'smooth',block:'end'}),50);}

function addMsg(role,html){
  const r=document.createElement('div');
  if(role==='bot'){r.className='msg-row';r.innerHTML=`<div class="av av-bot">S</div><div class="bubble bubble-bot">${html}</div>`;}
  else{r.className='msg-row user';r.innerHTML=`<div class="bubble bubble-user">${esc(html)}</div><div class="av av-user">U</div>`;}
  feed.appendChild(r);scrl();return r;
}

function addTyping(){const r=document.createElement('div');r.className='typing-row';r.id='tRow';r.innerHTML=`<div class="av av-bot">S</div><div class="bubble bubble-bot"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;feed.appendChild(r);scrl();}
function rmTyping(){document.getElementById('tRow')?.remove();}

function buildTierCard(p, tierKey) {
  const labelMap = { budget: 'BUDGET PICK', mid: 'TOP PICK', premium: 'PREMIUM' };
  const label = labelMap[tierKey] || tierKey.toUpperCase();
  const amz = p.links.amazon;
  const specsHtml = (p.key_specs || []).map(s => `<span class="tier-spec">${esc(s)}</span>`).join('');
  const imgHtml = p.image_url ? `<img src="${p.image_url}" style="width:100%;height:180px;object-fit:cover;border-bottom:4px solid var(--text);" onerror="this.style.display='none'">` : '';
  return `<div class="tier-card">
    ${imgHtml}
    <div class="tier-header">
      <span class="tier-label ${tierKey}">${label}</span>
      <span class="tier-price">${esc(p.estimated_price)}</span>
    </div>
    <div class="tier-body">
      <div class="tier-name">${esc(p.name)}</div>
      <div class="tier-tagline">${esc(p.tagline)}</div>
      <div class="tier-specs">${specsHtml}</div>
      <div class="tier-why">${esc(p.why)}</div>
      <div class="tier-buttons">
        <a class="tier-btn-primary" href="${amz}" target="_blank" rel="noopener">Buy on Amazon ↗</a>
        <div class="tier-alt-row">
          ${p.links.ebay ? `<a class="tier-btn-alt" href="${p.links.ebay}" target="_blank" rel="noopener">eBay</a>` : ''}
          ${p.links.walmart ? `<a class="tier-btn-alt" href="${p.links.walmart}" target="_blank" rel="noopener">Walmart</a>` : ''}
          ${p.links.google ? `<a class="tier-btn-alt" href="${p.links.google}" target="_blank" rel="noopener">Google</a>` : ''}
        </div>
      </div>
    </div>
  </div>`;
}

function buildCard(d) {
  let html = `<div style="font-size:16px;color:var(--text);line-height:1.5">${esc(d.intro)}</div>`;
  html += '<div class="tier-grid">';
  html += buildTierCard(d.budget, 'budget');
  html += buildTierCard(d.mid, 'mid');
  html += buildTierCard(d.premium, 'premium');
  html += '</div>';
  return html;
}

async function sendMsg(){
  const msg=txt.value.trim(); if(!msg||busy)return;
  busy=true;sBtn.disabled=true;txt.value='';autoResize(txt);
  document.getElementById('chipRow')?.remove();
  document.getElementById('introCard')?.remove();
  addMsg('user',msg);addTyping();
  try{
    const reqBody = { message: msg, history: historyLog };
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(reqBody)});
    if(!res.ok)throw new Error((await res.json()).detail||'Server error');
    const data=await res.json();rmTyping();addMsg('bot',buildCard(data));
    historyLog.push({ role: "user", content: msg });
    historyLog.push({ role: "assistant", content: JSON.stringify(data) });
  }catch(e){rmTyping();addMsg('bot',`<span style="color:#ff6b6b">⚠ ${esc(e.message)}</span>`);}
  finally{busy=false;sBtn.disabled=false;txt.focus();}
}

function clearChat() {
  historyLog = [];
  feed.innerHTML = `
    <div class="intro-card" id="introCard">
      <div class="ic-title">Let's find something cool!</div>
      <div class="ic-body">I can find the perfect product for any problem. What do you need?</div>
    </div>
    <div class="chip-row" id="chipRow">
      <div class="chip" onclick="useChip(this)">Surprise me with a cool gadget</div>
      <div class="chip" onclick="useChip(this)">I need a unique gift idea</div>
      <div class="chip" onclick="useChip(this)">What's the best tech accessory?</div>
    </div>
  `;
}
