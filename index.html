<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fixr | AI Product Finder</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a35;
      --accent: #c8f542;
      --accent2: #7b5cf0;
      --text: #f0f0f0;
      --muted: #7a7a8c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(123,92,240,0.12) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      bottom: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(200,245,66,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      z-index: 1;
    }

    header {
      padding: 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .pulse-dot {
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 14px var(--accent);
      animation: pulse 2.4s ease-in-out infinite;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .tagline {
      text-transform: uppercase;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .chat-feed {
      flex-grow: 1;
      padding-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    .intro-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      animation: fadeUp 0.35s ease both;
    }

    .headline {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 12px;
    }
    .headline .highlight { color: var(--accent); display: block; }
    
    .intro-body { color: var(--muted); font-size: 14.5px; margin-bottom: 20px; }

    .chips-container { display: flex; flex-wrap: wrap; gap: 8px; }

    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 7px 14px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200,245,66,0.06);
    }

    .message-row {
      display: flex;
      width: 100%;
      animation: fadeUp 0.35s ease both;
    }
    .message-row.user { justify-content: flex-end; }
    
    .bubble-user {
      background: #1e1e2e;
      border: 1px solid #2e2e42;
      border-radius: 18px;
      border-bottom-right-radius: 5px;
      padding: 12px 16px;
      max-width: 82%;
      font-size: 14.5px;
    }

    .bubble-bot-container {
      display: flex;
      gap: 12px;
      max-width: 82%;
    }

    .bot-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 12px;
      color: white;
      flex-shrink: 0;
    }

    .bubble-bot {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-top-left-radius: 5px;
      padding: 12px 16px;
      font-size: 14.5px;
      min-width: 0; /* fixes overflow inside flex */
    }

    .bot-intro-text { margin-bottom: 12px; }

    .product-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-top: 12px;
    }
    
    .pc-inner { padding: 16px; }

    .pc-label {
      color: var(--accent);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .pc-name { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    
    .pc-why { color: var(--muted); font-size: 13px; line-height: 1.5; margin-bottom: 16px; }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #0d0d0f;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.3px;
      border-radius: 100px;
      padding: 10px 18px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .cta-btn:hover {
      background: #d4f760;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(200,245,66,0.3);
    }
    .cta-btn svg { width: 13px; height: 13px; stroke-width: 2.5; }

    .pc-also {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      font-size: 12px;
      color: var(--muted);
    }
    .pc-also strong { color: var(--text); font-weight: 500; }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 6px 4px;
    }
    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: blink 1.4s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    .input-section {
      position: sticky;
      bottom: 0;
      padding: 20px 0;
      background: linear-gradient(0deg, var(--bg) 60%, transparent);
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 10px 10px 10px 18px;
      transition: border-color 0.2s;
      gap: 12px;
    }
    .input-wrapper:focus-within {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(123,92,240,0.12);
    }

    textarea {
      flex-grow: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      resize: none;
      outline: none;
      max-height: 120px;
      display: block;
      padding-top: 8px; /* Alignment fix */
    }
    textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--accent);
      border: none;
      color: #0d0d0f;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .send-btn svg { width: 18px; height: 18px; stroke-width: 2.5; stroke: currentColor; fill: none; }
    .send-btn:hover:not(:disabled) { background: #d4f760; transform: scale(1.05); }
    .send-btn:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    .disclaimer {
      text-align: center;
      color: #444455;
      font-size: 11px;
      margin-top: 12px;
    }
    .disclaimer a { color: #5a5a72; text-decoration: none; }
    .disclaimer a:hover { text-decoration: underline; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.3); opacity: 0.7; }
    }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%           { opacity: 1; transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-container">
        <div class="pulse-dot"></div>
        <div class="logo-text">Fixr</div>
      </div>
      <div class="tagline">AI Product Finder</div>
    </header>

    <div class="chat-feed" id="chatFeed">
      <div class="intro-card" id="introCard">
        <div class="headline">
          Describe your problem.
          <span class="highlight">Get the perfect product.</span>
        </div>
        <div class="intro-body">
          Tell me what's bothering you, what you need to fix, or what you're trying to accomplish — I'll find exactly what to buy.
        </div>
        <div class="chips-container">
          <button class="chip" onclick="fillInput('My back hurts when I work from home')">My back hurts when I work from home</button>
          <button class="chip" onclick="fillInput('I can\'t sleep because of noise')">I can't sleep because of noise</button>
          <button class="chip" onclick="fillInput('My coffee goes cold too fast')">My coffee goes cold too fast</button>
          <button class="chip" onclick="fillInput('I keep losing my keys')">I keep losing my keys</button>
          <button class="chip" onclick="fillInput('My phone dies halfway through the day')">My phone dies halfway through the day</button>
        </div>
      </div>
    </div>

    <div class="input-section">
      <div class="input-wrapper">
        <textarea id="promptInput" rows="1" placeholder="Type your problem here..." oninput="autoResize(this)"></textarea>
        <button id="sendBtn" class="send-btn" onclick="sendMessage()" disabled>
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"></line>
            <polyline points="5 12 12 5 19 12"></polyline>
          </svg>
        </button>
      </div>
      <div class="disclaimer">
        Links may be affiliate links — I earn a small commission if you buy. <a href="#">Learn more</a>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatFeed = document.getElementById('chatFeed');
    const introCard = document.getElementById('introCard');
    
    // API URL points to local FastAPI backend
    const API_URL = "/api/chat";

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
      sendBtn.disabled = el.value.trim().length === 0;
    }
    
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) {
          sendMessage();
        }
      }
    });

    function fillInput(text) {
      input.value = text;
      autoResize(input);
      input.focus();
    }

    function createBubbleUser(text) {
      const row = document.createElement('div');
      row.className = 'message-row user';
      row.innerHTML = `<div class="bubble-user">${escapeHtml(text)}</div>`;
      return row;
    }

    function createBubbleBot(contentHTML) {
      const row = document.createElement('div');
      row.className = 'message-row bot';
      row.innerHTML = `
        <div class="bubble-bot-container">
          <div class="bot-avatar">FX</div>
          <div class="bubble-bot">
             ${contentHTML}
          </div>
        </div>
      `;
      return row;
    }

    function createTypingIndicator() {
      return `
        <div class="typing-indicator" id="typingIndicator">
          <span></span><span></span><span></span>
        </div>
      `;
    }

    function generateProductCard(prod) {
      let alsoBlock = '';
      if (prod.product.also_consider) {
          alsoBlock = `<div class="pc-also">Also consider: <strong>${escapeHtml(prod.product.also_consider)}</strong></div>`;
      }
      return `
        <div class="bot-intro-text">${escapeHtml(prod.intro)}</div>
        <div class="product-card">
          <div class="pc-inner">
            <div class="pc-label">⚡ BEST MATCH</div>
            <div class="pc-name">${escapeHtml(prod.product.name)}</div>
            <div class="pc-why">${escapeHtml(prod.product.why)}</div>
            <a href="${prod.product.links.amazon}" target="_blank" class="cta-btn">
              View on Amazon
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <line x1="7" y1="17" x2="17" y2="7"></line>
                <polyline points="7 7 17 7 17 17"></polyline>
              </svg>
            </a>
          </div>
          ${alsoBlock}
        </div>
      `;
    }

    function scrollBottom() {
      // Need a small timeout to let DOM update layout before reading height
      setTimeout(() => {
        chatFeed.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'end' });
      }, 50);
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      // 1. Add user message
      input.value = '';
      autoResize(input);
      if (introCard && introCard.style.display !== 'none') {
        introCard.style.display = 'none';
      }
      
      chatFeed.appendChild(createBubbleUser(text));
      scrollBottom();

      // 2. Add typing indicator
      const typingRow = createBubbleBot(createTypingIndicator());
      chatFeed.appendChild(typingRow);
      scrollBottom();

      // 3. Make the API Call
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        
        if (!response.ok) {
            throw new Error((await response.json()).detail || "Server Error");
        }
        
        const data = await response.json();
        
        // 4. Swap typing for response
        typingRow.remove();
        chatFeed.appendChild(createBubbleBot(generateProductCard(data)));
        scrollBottom();

      } catch (err) {
        typingRow.remove();
        chatFeed.appendChild(createBubbleBot(`Oops, something went wrong: ${escapeHtml(err.message)}`));
        scrollBottom();
      }
    }

    function escapeHtml(unsafe) {
      if(!unsafe) return '';
      return String(unsafe)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
